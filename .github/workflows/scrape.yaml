name: Scrape

on:
  workflow_dispatch:
    inputs:
      networks:
        description: "Pro networks (space separated, or ALL)"
        default: "ALL"
  schedule:
    - cron: "0 0 * * *" # every day at midnight UTC

concurrency:
  group: scrape
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - name: Write certs
        run: |
          mkdir -p certs
          echo "${{ secrets.KAFKA_CA_PEM }}"       > certs/ca.pem
          echo "${{ secrets.KAFKA_SERVICE_CERT }}" > certs/service.cert
          echo "${{ secrets.KAFKA_SERVICE_KEY }}"  > certs/service.key
          chmod 600 certs/*
      - name: Seed
        env:
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          POSTGRES_URI:            ${{ secrets.POSTGRES_URI }}
          PRO_NETWORKS_STR:        ${{ github.event.inputs.networks }}
        run: python -m seed.producer
