name: Scrape
on:
  workflow_dispatch:
    inputs:
      networks:
        description: "Pro networks (space separated, or ALL)"
        default: "ALL"
  schedule:
    - cron: "0 6 * * *" # every day at 06:00 UTC
concurrency:
  group: scrape
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Scale up workers and sink
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          fly scale count worker=2 sink=1 --app meetupmap-worker --yes
          echo "Waiting 30s for machines to start..."
          sleep 30

      - name: Write certs
        run: |
          mkdir -p certs
          echo "${{ secrets.KAFKA_CA_PEM }}"       > certs/ca.pem
          echo "${{ secrets.KAFKA_SERVICE_CERT }}" > certs/service.cert
          echo "${{ secrets.KAFKA_SERVICE_KEY }}"  > certs/service.key
          chmod 600 certs/*

      - name: Seed
        env:
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          POSTGRES_URI:            ${{ secrets.POSTGRES_URI }}
          PRO_NETWORKS_STR:        ${{ github.event.inputs.networks || 'ALL' }}
        run: python -m seed.producer

  wait-and-scale-down:
    runs-on: ubuntu-latest
    needs: seed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Write certs
        run: |
          mkdir -p certs
          echo "${{ secrets.KAFKA_CA_PEM }}"       > certs/ca.pem
          echo "${{ secrets.KAFKA_SERVICE_CERT }}" > certs/service.cert
          echo "${{ secrets.KAFKA_SERVICE_KEY }}"  > certs/service.key
          chmod 600 certs/*

      - name: Wait for scrape to complete
        env:
          POSTGRES_URI: ${{ secrets.POSTGRES_URI }}
        run: |
          python - <<'EOF'
          import os, time, psycopg

          uri = os.environ["POSTGRES_URI"]
          poll_interval = 60  # seconds
          max_wait = 9 * 3600  # 9 hours

          print("Polling for scrape completion...")
          elapsed = 0
          while elapsed < max_wait:
              with psycopg.connect(uri) as pg:
                  with pg.cursor() as cur:
                      cur.execute("""
                          WITH run AS (
                              SELECT started_at, networks
                              FROM scrape_runs
                              WHERE id = (SELECT MAX(id) FROM scrape_runs)
                          ),
                          total AS (
                              SELECT COUNT(*) as n FROM groups
                              WHERE pro_network = ANY(
                                  SELECT unnest(string_to_array(networks, ',')) FROM run
                              )
                          ),
                          done AS (
                              SELECT COUNT(*) as n FROM groups
                              WHERE last_scraped_at >= (SELECT started_at FROM run)
                          )
                          SELECT done.n, total.n,
                              ROUND(100.0 * done.n / NULLIF(total.n, 0), 1) as pct
                          FROM done, total
                      """)
                      done, total, pct = cur.fetchone()
                      print(f"Progress: {done}/{total} ({pct}%)")
                      if pct is not None and pct >= 99.0:
                          print("Scrape complete!")
                          break
              time.sleep(poll_interval)
              elapsed += poll_interval
          else:
              print("Timed out waiting for scrape — scaling down anyway")
          EOF

      - name: Scale down workers and sink
        if: always()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          fly scale count worker=0 sink=0 --app meetupmap-worker --yes
          echo "Scaled down to 0."

  render-map:
    runs-on: ubuntu-latest
    needs: wait-and-scale-down
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .

      - name: Render map
        env:
          POSTGRES_URI: ${{ secrets.POSTGRES_URI }}
        run: python -m map.render

      - name: Commit and push map
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: update map [skip ci]"
          git push