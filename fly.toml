# fly.toml app configuration file generated for meetupmap-worker on 2026-03-31T15:13:45+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'meetupmap-worker'
primary_region = 'lhr'

[build]
  image = 'ghcr.io/notanotherpizza/meetup-map:latest'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
